<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>심즈 우체통</title>
  <style>
    :root {
      --bg: #f4ead9;
      --paper: #fffaf0;
      --panel: rgba(255, 250, 240, 0.82);
      --ink: #3f3028;
      --muted: #816f60;
      --line: #dac7ab;
      --tan: #c9ad86;
      --rose: #d8a6a0;
      --sage: #a9b99b;
      --cocoa: #6d4f3b;
      --shadow: 0 16px 40px rgba(72, 52, 35, 0.13);
      --radius: 14px;
    }

    body.dark {
      --bg: #201c19;
      --paper: #2c2722;
      --panel: rgba(48, 42, 36, 0.86);
      --ink: #f3e8d7;
      --muted: #c8b6a0;
      --line: #5c4d3e;
      --tan: #9d7f5c;
      --rose: #be837e;
      --sage: #879b78;
      --cocoa: #f0dfc8;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(216, 166, 160, 0.3), transparent 30%),
        linear-gradient(135deg, #f6eddf, var(--bg));
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    }

    body.dark {
      background:
        radial-gradient(circle at top left, rgba(111, 82, 69, 0.38), transparent 32%),
        linear-gradient(135deg, #171411, var(--bg));
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 8px;
      margin-bottom: 16px;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .tab-btn {
      min-height: 46px;
      border: 0;
      border-radius: 11px;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
    }

    .tab-btn.active {
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 7px 18px rgba(72, 52, 35, 0.1);
    }

    .view { display: none; }
    .view.active { display: block; }

    .mail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(310px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .letter-stage {
      width: min(100%, 660px);
      min-height: 680px;
      margin: 0 auto;
      padding: clamp(22px, 3vw, 36px);
      position: relative;
      overflow: hidden;
      --letter-bg:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.55), transparent 18%),
        radial-gradient(circle at 80% 18%, rgba(201, 173, 134, 0.12), transparent 22%),
        linear-gradient(rgba(109, 79, 59, 0.04) 1px, transparent 1px) 0 80px / 100% 34px,
        var(--paper);
      --letter-border: rgba(201, 173, 134, 0.5);
      --stamp-bg: linear-gradient(135deg, rgba(255, 250, 240, 0.86), rgba(239, 225, 200, 0.72));
      --title-font: "Noto Serif KR", "Nanum Myeongjo", "Georgia", serif;
      --body-font: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      --signature-font: "Noto Serif KR", "Nanum Myeongjo", "Georgia", serif;
      --body-size: clamp(17px, 1.9vw, 19px);
      background: var(--letter-bg);
      box-shadow: 0 20px 45px rgba(72, 52, 35, 0.16);
    }

    .letter-stage::before,
    .letter-stage::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .letter-stage::before {
      inset: 14px;
      border: 1px solid var(--letter-border);
    }

    .letter-stage::after {
      right: 28px;
      bottom: 24px;
      width: 112px;
      height: 112px;
      border: 10px double rgba(109, 79, 59, 0.09);
      border-radius: 50%;
    }

    .letter-inner {
      position: relative;
      z-index: 1;
    }

    .letter-topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .letter-date {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .stamp {
      width: 48px;
      height: 58px;
      display: grid;
      place-items: center;
      color: var(--accent, var(--cocoa));
      background: var(--stamp-bg);
      border: 1px dashed rgba(109, 79, 59, 0.26);
      border-radius: 4px;
      font-size: 20px;
      box-shadow: 0 5px 14px rgba(72, 52, 35, 0.08);
    }

    .postmark {
      position: absolute;
      right: 32px;
      bottom: 36px;
      color: rgba(109, 79, 59, 0.13);
      border: 2px solid currentColor;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 11px;
      font-weight: 900;
      transform: rotate(-12deg);
      pointer-events: none;
    }

    .letter-profile {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      margin: 0 0 26px;
    }

    .portrait-wrap {
      width: 92px;
      aspect-ratio: 4 / 5;
      padding: 5px;
      background: #fff;
      border: 1px solid rgba(109, 79, 59, 0.22);
      border-radius: 7px;
      transform: rotate(-1.2deg);
      box-shadow: 0 12px 26px rgba(72, 52, 35, 0.16);
    }

    .portrait {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: linear-gradient(145deg, #e7d6ba, #cbd9c9);
      border-radius: 4px;
      color: rgba(109, 79, 59, 0.72);
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .letter-title {
      margin: 0;
      color: var(--accent, var(--cocoa));
      font-family: var(--title-font);
      font-size: clamp(22px, 3vw, 31px);
      line-height: 1.24;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .letter-body {
      min-height: 330px;
      margin: 0;
      padding: 6px 4px 0;
      font-family: var(--body-font);
      font-size: var(--body-size);
      line-height: 1.9;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: anywhere;
      font-weight: 500;
    }

    .signature {
      margin-top: 24px;
      text-align: right;
      color: var(--accent, var(--cocoa));
      font-family: var(--signature-font);
      font-size: 18px;
      font-weight: 800;
    }

    .letter-stage.theme-floral {
      --letter-bg:
        radial-gradient(circle at 10% 16%, rgba(216, 166, 160, 0.22) 0 8px, transparent 9px),
        radial-gradient(circle at 15% 20%, rgba(169, 185, 155, 0.18) 0 5px, transparent 6px),
        radial-gradient(circle at 82% 14%, rgba(216, 166, 160, 0.16) 0 10px, transparent 11px),
        linear-gradient(rgba(109, 79, 59, 0.035) 1px, transparent 1px) 0 78px / 100% 34px,
        #fff6ec;
      --letter-border: rgba(216, 166, 160, 0.46);
      --stamp-bg: linear-gradient(135deg, #fff1ef, #f3dfd1);
      --title-font: "Nanum Pen Script", "Noto Serif KR", serif;
      --signature-font: "Nanum Pen Script", "Noto Serif KR", serif;
    }

    .letter-stage.theme-vintage {
      --letter-bg:
        radial-gradient(circle at 20% 12%, rgba(117, 84, 54, 0.08), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(117, 84, 54, 0.07), transparent 24%),
        linear-gradient(rgba(91, 66, 43, 0.05) 1px, transparent 1px) 0 82px / 100% 36px,
        #f3e5c7;
      --letter-border: rgba(117, 84, 54, 0.34);
      --stamp-bg: linear-gradient(135deg, #f7e7c9, #ddc095);
      --title-font: "Noto Serif KR", "Georgia", serif;
      --signature-font: "Noto Serif KR", "Georgia", serif;
    }

    .letter-stage.theme-diary {
      --letter-bg:
        linear-gradient(90deg, rgba(216, 166, 160, 0.4) 42px, transparent 43px),
        linear-gradient(rgba(88, 105, 125, 0.08) 1px, transparent 1px) 0 72px / 100% 32px,
        #fffaf2;
      --letter-border: rgba(88, 105, 125, 0.18);
      --stamp-bg: linear-gradient(135deg, #fff, #e8edf2);
      --title-font: "Noto Serif KR", "Nanum Myeongjo", serif;
    }

    .letter-stage.theme-check {
      --letter-bg:
        linear-gradient(rgba(109, 79, 59, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(109, 79, 59, 0.055) 1px, transparent 1px),
        #fff9e9;
      background-size: 28px 28px, 28px 28px, auto;
      --letter-border: rgba(109, 79, 59, 0.22);
      --stamp-bg: linear-gradient(135deg, #fff8dc, #e9f0d6);
      --title-font: "Noto Serif KR", "Nanum Myeongjo", serif;
    }

    .letter-stage.theme-postcard {
      min-height: 610px;
      --letter-bg:
        linear-gradient(90deg, transparent 0 55%, rgba(109, 79, 59, 0.12) 55.2%, transparent 55.5%),
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.68), transparent 20%),
        #fff4df;
      --letter-border: rgba(109, 79, 59, 0.26);
      --stamp-bg: linear-gradient(135deg, #fff, #f0dac3);
      --title-font: "Noto Serif KR", "Georgia", serif;
      --body-size: clamp(16.5px, 1.8vw, 18px);
    }

    .letter-stage.theme-doodle {
      --letter-bg:
        radial-gradient(circle at 86% 20%, rgba(169, 185, 155, 0.22) 0 4px, transparent 5px),
        radial-gradient(circle at 12% 88%, rgba(216, 166, 160, 0.18) 0 6px, transparent 7px),
        linear-gradient(rgba(109, 79, 59, 0.04) 1px, transparent 1px) 0 76px / 100% 31px,
        #fffdf3;
      --letter-border: rgba(109, 79, 59, 0.2);
      --stamp-bg: linear-gradient(135deg, #fffaf0, #eaf0d8);
      --title-font: "Nanum Pen Script", "Noto Serif KR", serif;
      --signature-font: "Nanum Pen Script", "Noto Serif KR", serif;
    }

    .letter-stage.theme-luxury {
      --letter-bg:
        radial-gradient(circle at 82% 16%, rgba(184, 145, 65, 0.16), transparent 18%),
        linear-gradient(rgba(184, 145, 65, 0.045) 1px, transparent 1px) 0 80px / 100% 34px,
        #fff8e8;
      --letter-border: rgba(184, 145, 65, 0.48);
      --stamp-bg: linear-gradient(135deg, #fff7dd, #e9cc83);
      --title-font: "Noto Serif KR", "Georgia", serif;
      --signature-font: "Noto Serif KR", "Georgia", serif;
    }

    .letter-stage.theme-moon {
      --letter-bg:
        radial-gradient(circle at 82% 14%, rgba(167, 158, 204, 0.28), transparent 19%),
        linear-gradient(rgba(86, 80, 123, 0.055) 1px, transparent 1px) 0 80px / 100% 34px,
        #f5f0ff;
      --letter-border: rgba(119, 109, 164, 0.3);
      --stamp-bg: linear-gradient(135deg, #fbf8ff, #ddd6f0);
      --title-font: "Noto Serif KR", "Nanum Myeongjo", serif;
    }

    .letter-stage.length-postcard {
      min-height: 560px;
    }

    .letter-stage.length-postcard .letter-body {
      min-height: 220px;
      font-size: clamp(17px, 1.9vw, 19px);
    }

    .letter-stage.length-long .letter-body {
      min-height: 390px;
      font-size: clamp(16.5px, 1.75vw, 18px);
      line-height: 1.84;
    }

    .letter-doodle {
      position: absolute;
      left: 28px;
      bottom: 28px;
      color: rgba(109, 79, 59, 0.18);
      font-size: 22px;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .empty-letter {
      min-height: 500px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 30px 12px;
    }

    .empty-letter h2 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: 28px;
    }

    .actions-panel {
      padding: 18px;
      background: rgba(255, 250, 240, 0.68);
      box-shadow: 0 12px 30px rgba(72, 52, 35, 0.08);
    }

    body.dark .actions-panel { background: rgba(48, 42, 36, 0.74); }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 14px;
      font-size: 20px;
    }

    .profile-box {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--paper) 72%, transparent);
      overflow: hidden;
    }

    summary {
      min-height: 48px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 900;
    }

    .profile-grid, .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 11px;
      color: var(--ink);
      background: color-mix(in srgb, var(--paper) 88%, white);
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
    }

    body.dark input, body.dark select, body.dark textarea {
      background: #24201c;
    }

    textarea { min-height: 98px; resize: vertical; }
    .span-2 { grid-column: 1 / -1; }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      color: var(--cocoa);
      background: rgba(169, 185, 155, 0.24);
      border: 1px solid rgba(103, 120, 93, 0.2);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .chip.rose {
      background: rgba(216, 166, 160, 0.22);
      border-color: rgba(166, 84, 71, 0.18);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .target-character-field,
    .target-character-bar label {
      margin-bottom: 12px;
    }

    .target-character-bar {
      max-width: 560px;
      margin: 14px auto 0;
      padding: 0 4px;
    }

    .category-btn,
    .ghost-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .icon-btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      background: var(--paper);
      font-weight: 900;
    }

    .category-btn.active {
      border-color: var(--rose);
      background: rgba(216, 166, 160, 0.25);
    }

    .primary-btn {
      width: 100%;
      min-height: 54px;
      color: #fffaf0;
      background: linear-gradient(135deg, #8d654d, #b98278);
      border: 0;
      box-shadow: 0 14px 28px rgba(141, 101, 77, 0.22);
    }

    .secondary-btn { background: rgba(169, 185, 155, 0.25); }
    .danger-btn { color: #8d342d; background: rgba(216, 166, 160, 0.18); }

    .letter-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0 14px;
    }

    .letter-actions .ghost-btn {
      width: 100%;
      min-width: 0;
      padding-inline: 10px;
      white-space: nowrap;
    }

    .hint {
      margin: 8px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .actions-panel > .hint { display: none; }

    .mini-list, .history-list, .character-list {
      display: grid;
      gap: 10px;
    }

    .mini-card, .history-card, .character-card {
      padding: 12px;
      background: color-mix(in srgb, var(--paper) 82%, transparent);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .history-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .mini-thumb {
      width: 58px;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 8px;
      background: #e7d6ba;
    }

    .mini-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .history-title {
      display: block;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .history-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-actions button, .tiny-actions button {
      min-height: 34px;
      padding: 6px 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: var(--paper);
      font-size: 12px;
      font-weight: 900;
    }

    .form-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .form-shell .panel, .history-panel { padding: 16px; }

    .form-sections {
      display: grid;
      gap: 10px;
    }

    .form-section {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: color-mix(in srgb, var(--paper) 72%, transparent);
    }

    .preset-row, .preview-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .preset-row button {
      min-height: 32px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(169, 185, 155, 0.2);
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .preview {
      position: relative;
      width: 76px;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--paper) 74%, transparent);
    }

    .preview.primary {
      border-color: var(--rose);
      box-shadow: 0 0 0 2px rgba(216, 166, 160, 0.22);
    }

    .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .preview-delete,
    .preview-primary {
      position: absolute;
      border: 1px solid rgba(63, 48, 40, 0.16);
      color: var(--ink);
      background: rgba(255, 250, 240, 0.88);
      box-shadow: 0 4px 10px rgba(72, 52, 35, 0.12);
      font-weight: 900;
    }

    .preview-delete {
      top: 4px;
      right: 4px;
      width: 26px;
      height: 26px;
      min-height: 26px;
      padding: 0;
      border-radius: 999px;
      line-height: 1;
    }

    .preview-primary {
      left: 4px;
      right: 4px;
      bottom: 4px;
      min-height: 26px;
      padding: 3px 5px;
      border-radius: 7px;
      font-size: 11px;
    }

    .preview-size {
      position: absolute;
      left: 4px;
      top: 4px;
      max-width: calc(100% - 36px);
      padding: 3px 5px;
      color: var(--cocoa);
      background: rgba(255, 250, 240, 0.82);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 900;
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .form-error {
      display: none;
      margin: 10px 0 0;
      padding: 10px;
      color: #7f2f27;
      background: rgba(216, 166, 160, 0.22);
      border: 1px solid rgba(127, 47, 39, 0.18);
      border-radius: 10px;
      font-weight: 800;
    }

    .form-error.show { display: block; }

    .character-card header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .character-card h3 {
      margin: 0 0 8px;
      overflow-wrap: anywhere;
    }

    .character-card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .tiny-actions {
      display: flex;
      gap: 5px;
    }

    .profile-detail {
      border-top: 1px solid var(--line);
      margin-top: 8px;
    }

    .profile-detail dl {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0 12px 12px;
    }

    .profile-detail div {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 8px;
    }

    dt { color: var(--muted); font-weight: 900; }
    dd { margin: 0; overflow-wrap: anywhere; }

    .archive-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .archive-tools {
      display: grid;
      grid-template-columns: auto auto minmax(180px, 1fr) minmax(140px, 0.6fr);
      gap: 8px;
      align-items: end;
      margin-bottom: 14px;
    }

    .archive-tools label {
      margin: 0;

      position: fixed;

      bottom: 20px;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function parseList(value) {
      if (Array.isArray(value)) return value.map((v) => String(v).trim()).filter(Boolean);
      return String(value || "").split(",").map((v) => v.trim()).filter(Boolean);
    }

    function todayRecordKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function normalizeDailyRecord(record = {}, dateKey = todayRecordKey()) {
      const legacyParts = [
        record.activities || record.todayActivities || "",
        record.memory || record.todayMemory || ""
      ].map((value) => String(value).trim()).filter(Boolean);
      return {
        date: record.date || dateKey,
        activities: String(record.activities || record.todayActivities || "").trim(),
        mood: String(record.mood || record.todayMood || "🙂 보통").trim() || "🙂 보통",
        memory: legacyParts.join("\n"),
        updatedAt: record.updatedAt || new Date().toISOString()
      };
    }

    function normalizeDailyRecords(records = {}) {
      const normalized = {};
      if (Array.isArray(records)) {
        records.forEach((record) => {
          const key = record.date || record.dateKey || todayRecordKey(new Date(record.updatedAt || Date.now()));
          normalized[key] = normalizeDailyRecord(record, key);
        });
        return normalized;
      }
      Object.entries(records || {}).forEach(([key, record]) => {
        normalized[key] = normalizeDailyRecord(record, key);
      });
      return normalized;
    }

    function normalizeImageRef(image) {
      if (!image) return null;
      if (typeof image === "string") {
        if (image.startsWith("data:image")) return { type: "localData", dataUrl: image };

      if (image.type === "indexedDB" && image.id) return { type: "indexedDB", id: image.id };
      if (image.imageId) return { type: "indexedDB", id: image.imageId, size: image.size || 0, name: image.name || "" };
      if (image.dataUrl || image.data) return { type: "localData", dataUrl: image.dataUrl || image.data };
      if (image.id) return { type: "indexedDB", id: image.id };
      return null;
    }

        belongings: (Array.isArray(news.belongings) && news.belongings.length ? news.belongings : [sample(theme.belongings || [])].filter(Boolean)).map((item) => String(item).trim()).filter(Boolean).slice(0, 4),
        discovery: String(news.discovery || sample(theme.discoveries || ["별건 아닌데 기억에 남았어."])).trim(),
        quote: String(news.quote || sample(theme.quotes)).trim(),
        image: normalizeImageRef(news.image),
        accentColor: /^#[0-9a-f]{6}$/i.test(news.accentColor || "") ? news.accentColor : "#d8a6a0",
        isFavorite: Boolean(news.isFavorite),
        createdAt: news.createdAt || new Date().toISOString()
      };
    }

    function sanitizeForLocalStorage(data) {
      return {
        ...data,
        dataVersion: DATA_VERSION,
        characters: asArray(data.characters).map((character) => ({
          ...character,
          images: asArray(character.images).filter((image) => image?.type === "indexedDB" && image.id)
        })),
        letters: asArray(data.letters).map((letter) => ({
          ...letter,
          image: letter.image?.type === "indexedDB" ? letter.image : null
        })),
        currentLetterId: null,
        currentNews: null,
        newsArchive: asArray(data.newsArchive).map((news) => ({
          ...news,
          image: news.image?.type === "indexedDB" ? news.image : null
        }))
      };
    }

    function looksLikeSavedState(data) {
      if (!data || typeof data !== "object") return false;
      return Boolean(
        data.characters ||
        data.letters ||
        data.newsArchive ||
        data.userProfile ||
        data.dailyRecords ||
        data.todayRecords ||
        data.records ||
        data.generationMemory
      );
    }

    function normalizeState(rawState = {}) {
      return {
        ...structuredClone(defaultState),
        ...rawState,
        dataVersion: DATA_VERSION,
        selectedCategory: normalizeCategoryName(rawState.selectedCategory || defaultState.selectedCategory),
        selectedCharacterId: rawState.selectedCharacterId || "all",
        darkMode: Boolean(rawState.darkMode),
        userProfile: normalizeUserProfile(rawState.userProfile || rawState.profile || rawState.todayMe),
        dailyRecords: normalizeDailyRecords(rawState.dailyRecords || rawState.todayRecords || rawState.records),
        generationMemory: normalizeGenerationMemory(rawState.generationMemory),
        characters: asArray(rawState.characters || rawState.sims).map(normalizeCharacter).filter((character) => character.displayName),
        letters: asArray(rawState.letters || rawState.mailHistory || rawState.history).map(normalizeLetter),
        currentLetterId: null,
        currentNews: null,
        newsArchive: asArray(rawState.newsArchive || rawState.todayNewsArchive || rawState.newsHistory).map(normalizeNewsItem).filter(Boolean)
      };
    }

    function importStatePayload(payload) {
      const parsed = typeof payload === "string" ? JSON.parse(payload) : payload;
      return normalizeState(parsed);
    }

    function exportStatePayload(data = state) {
      return JSON.stringify(sanitizeForLocalStorage(data), null, 2);
    }

    function loadState() {
      const keys = [STORAGE_KEY, ...LEGACY_KEYS];
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (key && /sims|mail|letter|우체통/i.test(key) && !keys.includes(key)) keys.push(key);
      }
      for (const key of keys) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!looksLikeSavedState(parsed)) continue;
          return normalizeState(parsed);
        } catch (_) {}
      }
      return structuredClone(defaultState);
    }

    function saveState() {
      state.dataVersion = DATA_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sanitizeForLocalStorage(state)));
      updateStorageInfo();
    }

    function openImageDb() {
      if (dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(IMAGE_STORE)) db.createObjectStore(IMAGE_STORE, { keyPath: "id" });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
      return dbPromise;
    }

    async function putImage(record) {
      const db = await openImageDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IMAGE_STORE, "readwrite");
        tx.objectStore(IMAGE_STORE).put(record);
        tx.oncomplete = () => resolve(record);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getImage(id) {
      if (!id) return null;
      const db = await openImageDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IMAGE_STORE, "readonly");
        const request = tx.objectStore(IMAGE_STORE).get(id);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteImage(id) {
      if (!id) return;
      const db = await openImageDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IMAGE_STORE, "readwrite");
        tx.objectStore(IMAGE_STORE).delete(id);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dataUrlToBlob(dataUrl) {
      const response = await fetch(dataUrl);
      return response.blob();
    }

    function collectLegacyCharacters() {
      const found = [];
      const keys = [STORAGE_KEY, ...LEGACY_KEYS];
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (key && /sims|mail|letter|우체통/i.test(key) && !keys.includes(key)) keys.push(key);
      }
      for (const key of keys) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || "");
          if (parsed?.characters?.length) found.push(...parsed.characters);
        } catch (_) {}
      }
      return found;
    }

    function sameLegacyCharacter(current, legacy) {
      const names = [
        legacy.displayName,
        legacy.name,
        legacy.characterName,
        legacy.fullName
      ].map((value) => String(value || "").trim()).filter(Boolean);
      return legacy.id === current.id || names.includes(current.displayName) || (current.fullName && names.includes(current.fullName));
    }

    function legacyLocalImagesFor(character, legacyCharacters) {
      return legacyCharacters
        .filter((legacy) => sameLegacyCharacter(character, legacy))
        .flatMap((legacy) => legacy.images || [])
        .map(normalizeImageRef)
        .filter((image) => image?.type === "localData" && image.dataUrl);
    }

    async function storeLocalImageRef(image, name) {
      const blob = await dataUrlToBlob(image.dataUrl);
      const record = { id: uid("img"), blob, mime: blob.type || "image/jpeg", size: blob.size, name, createdAt: new Date().toISOString() };
      await putImage(record);
      return { type: "indexedDB", id: record.id, size: record.size, name: record.name };
    }

    async function migrateLegacyImages() {
      let migrated = 0;
      let recovered = 0;
      let missing = 0;
      const legacyCharacters = collectLegacyCharacters();
      for (const character of state.characters) {
        const next = [];
        let characterMissing = 0;
        for (const image of character.images) {
          if (image.type === "localData") {
            try {
              next.push(await storeLocalImageRef(image, `${character.displayName} 이미지`));
              migrated += 1;
            } catch (_) {}
          } else {
            const record = await getImage(image.id);
            if (record?.blob) {
              next.push({ ...image, size: image.size || record.size || record.blob.size || 0, name: image.name || record.name || "" });
            } else {
              missing += 1;
              characterMissing += 1;
            }
          }
        }
        if (!next.length || characterMissing) {
          const legacyImages = legacyLocalImagesFor(character, legacyCharacters);
          for (const image of legacyImages) {
            try {
              next.push(await storeLocalImageRef(image, `${character.displayName} 복구 이미지`));
              recovered += 1;
            } catch (_) {}
          }
        }
        character.images = next;
        if (!character.images.some((image) => image.id === character.primaryImageId)) {
          character.primaryImageId = character.images[0]?.id || "";
        }
      }
      for (const letter of state.letters) {
        if (letter.image?.type === "localData") {
          try {
            letter.image = await storeLocalImageRef(letter.image, "편지 이미지");
            migrated += 1;
          } catch (_) {
            letter.image = null;
          }
        } else if (letter.image?.type === "indexedDB") {
          const record = await getImage(letter.image.id);
          if (!record?.blob) {
            const character = getCharacterById(letter.characterId);
            letter.image = getRandomImage(character);
            missing += 1;
          }
        } else {
          const character = getCharacterById(letter.characterId);
          letter.image = getRandomImage(character);
        }
      }
      if (migrated || recovered || missing) {
        saveState();
        toast(recovered ? `기존 이미지 ${recovered}장을 복구했어요.` : `기존 이미지 ${migrated}장을 IndexedDB로 옮겼어요.`);
      }
    }

    function weightedThemePool(character, category) {
      const categoryName = normalizeCategoryName(category);
      const text = writerText(character);
      const base = ["cream", "floral", "vintage", "diary", "check", "postcard", "doodle", "luxury", "moon"];
      const map = {
        "아침 인사": ["cream", "floral", "check", "postcard"],
        "밤 인사": ["moon", "vintage", "cream", "luxury"],
        "응원": ["floral", "cream", "check", "diary"],
        "다정한 말": ["cream", "floral", "postcard", "moon"],
        "일상 대화": ["diary", "check", "vintage", "cream"],

        "캐릭터 전용": ["cream", "diary", "postcard", "floral", "vintage"]
      };
      const pool = [...(map[categoryName] || base), ...(map[categoryName] || base)];
      if (/사진|스샷|카메라|예술|감성|다온/.test(text)) pool.push("postcard", "floral", "diary");
      if (/커피|업무|현실|계획|휘건|차분/.test(text)) pool.push("vintage", "diary", "check");
      if (/자연|농장|식물|동물|양|포피|세이지/.test(text)) pool.push("floral", "check", "vintage");
      if (/귀족|왕실|품위|코델리아|골드/.test(text)) pool.push("luxury", "vintage", "moon");
      pool.push(sample(base));
      return pool;
    }

    function endingKey(line) {
      const text = String(line || "").trim().replace(/[.!?。？！…]+$/g, "");
      const patterns = ["했어", "났어", "더라", "좋았어", "같아", "믿어", "괜찮아", "잖아", "거야", "해", "까"];
      return patterns.find((ending) => text.endsWith(ending)) || text.slice(-2);
    }

      const todayDate = new Date(todayRecordKey());

        .map((record) => normalizeDailyRecord(record, record.date))
        .filter((record) => record.activities || record.memory || record.mood)
        .sort((a, b) => String(b.date).localeCompare(String(a.date)));
      const today = records.find((record) => record.date === todayRecordKey() && (record.activities || record.memory));
      if (today) return today;
      return records.find((record) => {
        const date = new Date(record.date);
        const diffDays = (todayDate - date) / 86400000;
        return diffDays > 0 && diffDays <= 3 && (record.activities || record.memory);

    const commonLetterTopics = [
      "하늘", "창문", "커피", "차", "산책", "책", "음악", "고양이", "꽃", "비",
      "바람", "노을", "정리", "작은 실수", "기다림", "쉬는 시간", "간식", "사진",
      "낯선 사람", "조용한 오후", "늦은 밤", "아침 공기"
    ];

    function lineFingerprint(line) {
      return String(line || "")
        .replace(/[^\p{L}\p{N}\s]/gu, "")
        .replace(/\s+/g, "")
        .toLowerCase();
    }

    function lineSimilarity(a, b) {
      const fa = lineFingerprint(a);
      const fb = lineFingerprint(b);
      if (!fa || !fb) return 0;
      if (fa === fb) return 1;
      const grams = (text) => {
        const set = new Set();
        for (let i = 0; i < Math.max(1, text.length - 2); i += 1) set.add(text.slice(i, i + 3));
        return set;
      };
      const aSet = grams(fa);
      const bSet = grams(fb);
      const intersection = [...aSet].filter((gram) => bSet.has(gram)).length;
      const union = new Set([...aSet, ...bSet]).size || 1;
      return intersection / union;
    }

    function recentGenerationMemory(characterId = "") {
      return normalizeGenerationMemory(state.generationMemory).filter((item) => !characterId || item.characterId === characterId);
    }

    function isRecentlyUsedLine(line, role, characterId) {
      const recent = normalizeGenerationMemory(state.generationMemory).slice(0, 30);
      return recent.some((item) => {
        const roleMatch = role && item[role] && lineSimilarity(line, item[role]) > 0.72;
        const lineMatch = (item.lines || []).some((used) => lineSimilarity(line, used) > 0.78);
        const sameCharacterBoost = item.characterId === characterId && (roleMatch || lineMatch);
        return sameCharacterBoost || roleMatch || lineMatch;
      });
    }

    function pickFreshLine(pool, role, characterId, usedEndings) {
      const uniquePool = [...new Set(pool.filter(Boolean))];
      let candidates = uniquePool
        .filter((line) => !isRecentlyUsedLine(line, role, characterId))
        .filter((line) => !usedEndings.has(endingKey(line)));
      if (!candidates.length) candidates = uniquePool.filter((line) => !usedEndings.has(endingKey(line)));
      if (!candidates.length) candidates = uniquePool;
      const line = sample(candidates);
      usedEndings.add(endingKey(line));
      return line;
    }

    function characterLens(character) {
      const text = writerText(character);
      const tone = character.tone || "";
      const lens = {
        soft: /다정|감성|낭만|배려|상냥|가족|사랑/.test(text + tone),
        playful: /장난|활발|유쾌|괴짜|개그/.test(text + tone),
        practical: /현실|완벽|계획|업무|직장|야심|성공|꼼꼼/.test(text + tone),
        noble: /귀족|품위|왕|코델리아/.test(text + tone),
        curious: /호기심|사진|작가|예술|창작|관찰|스샷/.test(text + tone),
        quiet: /차분|소심|생각|고민|내향|조용/.test(text + tone),
        nature: /자연|농장|정원|식물|동물|흙|양/.test(text + tone),
        awkwardKind: /츤데레|무뚝뚝|서툴|표현/.test(text + tone)
      };
      if (!Object.values(lens).some(Boolean)) lens.soft = true;
      return lens;
    }

    function topicFromRecord() {
      const record = getRecentDailyRecord();
      if (!record) return "";
      const text = `${record.memory || record.activities}`.replace(/\s/g, "");
      if (/스샷|스크린샷|사진|캡처/.test(text)) return "사진";
      if (/노션|정리|링크|폴더|목록|체크/.test(text)) return "정리";
      if (/커피|카페|차/.test(text)) return /차/.test(text) ? "차" : "커피";
      if (/책|독서|문장/.test(text)) return "책";
      if (/음악|노래|플리|기타|피아노/.test(text)) return "음악";
      if (/고양이|강아지|동물|양|포피/.test(text)) return /고양이/.test(text) ? "고양이" : "산책";
      if (/비|우산/.test(text)) return "비";
      if (/저녁|밥|간식|디저트/.test(text)) return "간식";
      return "";
    }

    function pickTopic(character, category) {
      const memory = normalizeGenerationMemory(state.generationMemory);
      const recentTopics = new Set(memory.slice(0, 6).map((item) => item.topic).filter(Boolean));
      const characterRecentTopics = new Set(memory.filter((item) => item.characterId === character.id).slice(0, 8).map((item) => item.topic).filter(Boolean));
      const recordTopic = topicFromRecord();
      const weighted = [...commonLetterTopics];
      if (recordTopic) weighted.unshift(recordTopic, recordTopic);
      if (normalizeCategoryName(category) === "아침 인사") weighted.unshift("아침 공기", "창문", "차");
      if (normalizeCategoryName(category) === "밤 인사") weighted.unshift("늦은 밤", "책", "창문");
      if (normalizeCategoryName(category) === "개그") weighted.unshift("작은 실수", "간식", "낯선 사람");
      const candidates = weighted.filter((topic) => !recentTopics.has(topic) && !characterRecentTopics.has(topic));
      return sample(candidates.length ? candidates : weighted);
    }

        "그럼 이만 줄일게. 너무 멋있게 끝내면 부담스러우니까."
      ];
      if (lens.noble) pool.unshift("부디 너의 하루에 품위 있는 간식 시간이 허락되길.");
      if (lens.practical) pool.unshift("오늘 할 일 하나쯤 줄여도 돼. 문서상으로는 휴식이라고 쓰자.");
      if (lens.playful) pool.unshift("혹시 웃었으면 내 승리야. 안 웃었으면 다음 편에서 재도전할게.");
      if (lens.awkwardKind) pool.unshift("별말 아니야. 그냥 조금 웃었으면 해서 쓴 거야. 뭐, 그런 거지.");
      return pool;
    }

    function isDaonLike(character) {
      const text = `${getDisplayName(character)} ${character.fullName || ""} ${character.mbti || ""} ${writerText(character)} ${character.tone || ""}`;
      return /다온|ENFP|활발|장난|감성|즉흥|호기심|사진/.test(text);
    }

    function idleThoughtPool(topic, character) {
      const lens = characterLens(character);
      const pool = [
        "그러고 보니 이 얘기를 왜 편지로 쓰고 있지.",
        "별 의미는 없어. 그냥 기억났어.",
        "근데 적고 나니까 조금 웃기다.",
        "아무튼 그 장면이 계속 떠올랐어.",
        "설명하려고 하면 재미없어지는 종류의 일이야.",
        "너한테 말하면 알아들을 것 같아서 적어봤어.",
        "이런 얘기는 말로 하면 중간에 까먹을 것 같아.",
        "그리고 지금 생각났는데, 이건 별로 중요한 얘기가 아니야.",
        "근데 중요하지 않아서 더 편하게 말하게 되는 것도 있잖아.",
        "아니, 쓰다 보니 더 이상해졌네."
      ];
      if (topic) pool.push(`${topic} 얘기로 시작했는데 어디로 가는지는 나도 모르겠어.`);
      if (lens.playful) pool.push("혼자 심각한 표정으로 보다가 갑자기 웃겨졌어.");
      if (lens.practical) pool.push("분류하자면 잡생각. 처리 기한 없음.");
      if (lens.noble) pool.push("품위 있게 말하려 했는데, 솔직히 그냥 이상했다.");
      if (lens.quiet) pool.push("크게 말할 얘기는 아니라서 작게 적어둬.");
      if (lens.nature) pool.push("가만히 두면 알아서 지나갈 생각이었는데, 내가 붙잡아버렸어.");
      if (lens.awkwardKind) pool.push("괜히 말 꺼냈나 싶지만 이미 늦었어.");
      if (isDaonLike(character)) {
        pool.unshift(
          "너 이거 봤으면 분명 나랑 같은 표정 했을 것 같아. 아니면 내가 너무 신난 걸 수도 있고.",
          "갑자기 네 생각이 났는데, 왜인지 설명하라면 좀 곤란해.",
          "아 맞다, 이 얘기 하려고 했는데 중간에 다른 생각이 끼어들었어.",
          "사진 찍을까 하다가 놓쳤어. 그래서 지금 말로 찍는 중.",
          "이름 붙여주고 싶었는데 세 글자쯤 생각하다가 까먹었어."
        );
      }
      return pool;
    }

    function abruptEndingPool(character, category) {
      const categoryName = normalizeCategoryName(category);
      const pool = [
        "그냥 그랬어.",
        "끝.",
        "아무튼 이 얘기.",
        "별건 아니고.",
        "여기까지.",
        "갑자기 끝내기.",
        "나중에 또 생각나면 말할게.",
        "근데 아마 까먹을 수도 있어.",
        "이상한 편지 끝.",
        "쓰고 보니 진짜 메모 같네."
      ];
      if (categoryName === "아침 인사") pool.push("아침부터 별 얘기를 다 하지.");
      if (categoryName === "밤 인사") pool.push("밤이라 그런가, 말이 조금 샜어.");
      if (categoryName === "응원") pool.push("응원...까지는 아니고 그냥 네 편이라는 메모.");
      if (categoryName === "개그") pool.push("웃겼으면 됐고, 아니면 다음 기회에.");
      if (isDaonLike(character)) {
        pool.unshift(
          "아, 갑자기 딴 얘기 하고 싶어졌어. 참을게.",
          "아무튼 보내기 전에 마음 바뀔까 봐 그냥 보냄.",
          "나 지금 좀 신난 것 같지. 맞아.",
          "끝! 아니 하나 더 쓰려다가 참았어."
        );
      }
      return pool;
    }

    function reviewLetterLines(lines, topic) {
      const bannedFloating = [
        "그 얘기를 보니까",
        "그 순간이 떠올랐어",
        "그런 느낌이 들더라",
        "괜히 웃음이 났어"
      ];
      const bannedWisdom = [
        "하루를 특별하게",
        "작은 순간",
        "충분해",
        "앞으로 가고",
        "따뜻했으면",
        "마음이 덜",
        "무리하지",
        "한 걸음",
        "좋은 인연",
        "서두르지",
        "결론을",
        "의미",
        "교훈"
      ];
      return lines.map((line, index) => {
        const hasFloating = bannedFloating.some((phrase) => line.includes(phrase));
        const hasWisdom = bannedWisdom.some((phrase) => line.includes(phrase));
        if (!hasFloating && !hasWisdom) return line;
        if (index <= 1) return `${topic} 얘기하려고 했는데, 쓰니까 좀 이상하네.`;
        return sample([
          "아무튼 그게 갑자기 생각났어.",
          "쓰고 보니까 진짜 별 얘기 아니네.",
          "근데 이런 얘기도 편지에 써도 되나.",
          "여기까지 쓰고 나니까 좀 민망해졌어.",
          "설명하려니까 더 이상해져서 그만둘게."
        ]);
      });
    }

    function openerPool(character) {
      const callName = getUserCallName();
      const map = {
        "귀족형": [`안녕하신가, ${callName}.`, `${callName}, 잠시 안부를 전하러 왔단다.`, `오늘은 짧은 서신을 남기겠네, ${callName}.`, `${callName}, 차분히 읽어주면 좋겠구나.`],
        "츤데레": [`안녕, ${callName}. 뭐, 그냥 편지야.`, `${callName}, 별건 아니고.`, `잠깐만 읽어, ${callName}.`, `${callName}, 굳이 길게 쓸 생각은 없었는데.`],
        "활발함": [`안녕, ${callName}!`, `${callName}, 잠깐만 여기 봐줘!`, `좋아, ${callName}. 오늘은 이 얘기야!`, `${callName}, 나 지금 할 말 생겼어!`],
        "감성적": [`안녕, ${callName}.`, `${callName}, 오늘은 짧게 남겨둘게.`, `문득 편지가 쓰고 싶어졌어, ${callName}.`, `${callName}, 조용히 이름을 불러보고 싶었어.`],
        "현실조언형": [`안녕, ${callName}. 짧게 적어볼게.`, `${callName}, 잠깐만 읽어줘.`, `길게는 안 쓸게, ${callName}.`, `${callName}, 지금 필요한 말만 남겨볼게.`],
        "차분함": [`안녕, ${callName}. 잠깐 앉아서 읽어줘.`, `${callName}, 조용히 안부를 적어봐.`, `잠시만 숨 고르고 읽어줘, ${callName}.`, `${callName}, 오늘은 느리게 적어볼게.`],
        "장난기": [`안녕, ${callName}. 이제 내 차례지.`, `${callName}, 편지 하나 남길게.`, `${callName}, 놀라지 마. 이번엔 꽤 얌전한 편지야.`, `자, ${callName}. 오늘의 작은 이벤트야.`],
        "다정함": [`안녕, ${callName}.`, `${callName}, 문득 안부가 궁금했어.`, `오늘도 이름을 한 번 불러보고 싶었어, ${callName}.`, `${callName}, 짧게 마음을 놓고 갈게.`]
      };
      return [
        ...(map[character.tone] || map["다정함"]),
        `${callName}, 편지 한 장 남겨둘게.`,
        `잠깐 네 생각이 스쳐서 적어봐, ${callName}.`,
        `${callName}, 오늘은 이런 얘기를 해보고 싶었어.`,
        `혹시 지금 바쁘지 않다면, ${callName}.`,
        `${callName}, 작은 안부 하나 두고 갈게.`,
        `별일은 아니지만 들어줘, ${callName}.`,
        `${callName}, 오늘 본 걸 조금 나눠주고 싶어.`,
        `편지를 쓰기엔 사소한 얘기일지도 모르지만, ${callName}.`,
        `${callName}, 잠깐 떠오른 장면이 있어.`,
        `지금쯤 네가 이걸 읽는다고 생각하면서 적어.`,
        `${callName}, 말로 하면 금방 사라질 것 같아서 적어둘게.`,
        `오늘은 이런 안부가 먼저 떠올랐어, ${callName}.`,
        `${callName}, 너무 길지 않게 써볼게.`,
        `문득 조용한 얘기가 하고 싶어졌어, ${callName}.`,
        `${callName}, 오늘은 평범한 얘기 하나야.`
      ];
    }

    function composeLetterBody(character, category) {
      const topic = pickTopic(character, category);
      const usedEndings = new Set();
      const opener = pickFreshLine(openerPool(character), "opener", character.id, usedEndings);
      const occasion = pickFreshLine(topicScenePool(topic), "lines", character.id, usedEndings);
      const recordPool = makeRecordReflectionPool(character);
      const isJoke = normalizeCategoryName(category) === "개그";
      const interpretation = pickFreshLine(
        isJoke
          ? (recordPool.length ? [...recordPool, ...jokeStoryPool(topic, character), ...idleThoughtPool(topic, character)] : [...jokeStoryPool(topic, character), ...idleThoughtPool(topic, character)])
          : (recordPool.length ? [...recordPool, ...idleThoughtPool(topic, character)] : [...idleThoughtPool(topic, character), ...interpretTopicPool(topic, character)]),
        "lines",
        character.id,
        usedEndings
      );
      const question = Math.random() < 0.28
        ? pickFreshLine(
            isJoke
              ? [
                  "너도 오늘 이상한 거 하나 봤어?",
                  "이거 웃긴 얘기 맞나?",
                  "지금쯤 너도 뭔가 딴생각 중이려나.",
                  "아니면 말고."
                ]
              : questionPool(topic),
            "question",
            character.id,
            usedEndings
          )
        : "";
      const closing = pickFreshLine(isJoke ? [...abruptEndingPool(character, category), ...jokeClosingPool(character).slice(0, 3)] : abruptEndingPool(character, category), "closing", character.id, usedEndings);
      const lengthRoll = Math.random();
      const lengthType = lengthRoll < 0.24 ? "postcard" : (lengthRoll > 0.78 ? "long" : "normal");
      const extraLine = lengthType === "long"
        ? pickFreshLine(
            isJoke ? [...jokeStoryPool(topic, character), ...idleThoughtPool(topic, character)] : idleThoughtPool(topic, character),
            "lines",
            character.id,
            usedEndings
          )
        : "";
      const rawLines = lengthType === "postcard"
        ? [opener, occasion, closing]
        : (lengthType === "long" ? [opener, occasion, interpretation, extraLine, question, closing] : [opener, occasion, interpretation, question, closing]);
      const lines = reviewLetterLines(rawLines.filter(Boolean), topic);
      return {
        body: lines.join("\n\n"),
        lengthType,
        meta: {
          characterId: character.id,
          category: normalizeCategoryName(category),
          topic,
          opener,
          question,
          closing,
          lengthType,
          lines,
          createdAt: new Date().toISOString()
        }
      };
    }

    function rememberGeneration(meta) {
      if (!meta) return;
      state.generationMemory = normalizeGenerationMemory([meta, ...(state.generationMemory || [])]).slice(0, 30);
    }

    // 편지 생성에 반영되는 입력값
    // - 실제 성격, MBTI, 말투 스타일, 좋아하는 것, 싫어하는 것은 편지를 쓰는 캐릭터의 목소리와 관점에만 사용한다.
    // - 사용자 이름/애칭은 호명 방식에, 오늘의 나 기분과 메모는 편지를 받는 사람의 오늘 상태에만 사용한다.
    // - 캐릭터 성격을 사용자 성격처럼 단정하지 않고, 캐릭터가 자기 이야기를 꺼내는 방식으로만 쓴다.
    function generateLetter(character, requestedCategory) {
      const requested = normalizeCategoryName(requestedCategory);
      const category = requested === "랜덤" ? sample(categories.slice(1)) : requested;
      const displayName = getDisplayName(character);
      const emoji = getSignatureEmoji(character);
      const composed = composeLetterBody(character, category);
      const themeId = chooseLetterTheme(character, category);
      const stampEmoji = chooseStampEmoji(character, themeId);
      return {
        id: uid("letter"),
        characterId: character.id,
        characterName: displayName,
        title: makeTitle(character, category),
        category,
        body: composed.body,
        signature: `- ${displayName}${emoji ? ` ${emoji}` : ""}`,
        accentColor: getAccentColor(character),
        image: getRandomImage(character),
        themeId,
        stampEmoji,
        doodleEmoji: chooseDoodleEmoji(stampEmoji),
        lengthType: composed.lengthType || "normal",
        createdAt: new Date().toISOString(),
        dateLabel: todayKey(),
        favorite: false,
        generationMeta: composed.meta
      };
    }

    async function hydrateImageElement(img, imageRef) {
      if (!img || !imageRef) {
        if (img) img.src = fallbackImage;
        return;
      }
      try {
        if (imageRef.type === "indexedDB") {
          const record = await getImage(imageRef.id);
          if (!record?.blob) throw new Error("image missing");
          const url = URL.createObjectURL(record.blob);
          img.onload = () => URL.revokeObjectURL(url);
          img.src = url;
        } else if (imageRef.type === "localData") {
          img.src = imageRef.dataUrl;
        } else {
          img.src = fallbackImage;
        }
      } catch (_) {
        img.src = fallbackImage;
      }
    }

    function renderLetter(letter) {
      const display = $("#letterDisplay");
      const stage = $("#letterStage");
      if (!letter) {
        stage.classList.remove("has-accent");
        stage.classList.remove(...Object.values(letterThemes).map((item) => item.className), "length-postcard", "length-normal", "length-long");
        stage.style.removeProperty("--accent");
        display.innerHTML = `
          <div class="empty-letter">
            <div>
              <h2>${state.characters.length ? "우체통 문을 열어볼까요?" : "아직 우체통이 조용해요"}</h2>
              <p>${state.characters.length ? "오늘의 편지 받기 버튼을 눌러보세요." : "캐릭터를 등록하고 오늘의 편지를 받아보세요."}</p>
            </div>
          </div>`;
        $("#favoriteBtn").disabled = true;
        $("#screenshotBtn").disabled = true;
        updateScreenshotControls();
        return;
      }
      const character = getCharacterById(letter.characterId);
      const accentColor = letter.accentColor || getAccentColor(character);
      const theme = letterThemes[letter.themeId] || letterThemes.cream;
      stage.classList.remove(...Object.values(letterThemes).map((item) => item.className), "length-postcard", "length-normal", "length-long");
      stage.classList.add("has-accent");
      stage.classList.add(theme.className);
      stage.classList.add(`length-${letter.lengthType || "normal"}`);
      stage.style.setProperty("--accent", accentColor);
      const stampEmoji = letter.stampEmoji || chooseStampEmoji(character, letter.themeId || "cream");
      const doodleEmoji = letter.doodleEmoji || "";
      display.innerHTML = `
        <div class="letter-topline">
          <div class="letter-date">${escapeHtml(formatLetterDate(letter.createdAt || letter.dateLabel))}</div>
          <div class="stamp" aria-hidden="true">${escapeHtml(stampEmoji)}</div>
        </div>
        <div class="letter-profile">
          <div class="portrait-wrap">
            <div class="portrait"><img id="currentLetterImage" src="${fallbackImage}" alt="${escapeHtml(letter.characterName)} 이미지"></div>
          </div>
          <div class="letter-meta">
            <h2 class="letter-title">${escapeHtml(letter.title)}</h2>
          </div>
        </div>
        <p class="letter-body">${escapeHtml(letter.body)}</p>
        <div class="signature">${escapeHtml(letter.signature)}</div>
        <div class="postmark" aria-hidden="true">SIM MAIL</div>
        ${doodleEmoji ? `<div class="letter-doodle" aria-hidden="true">${escapeHtml(doodleEmoji)}</div>` : ""}
      `;
      hydrateImageElement($("#currentLetterImage"), letter.image);
      $("#favoriteBtn").disabled = false;
      $("#screenshotBtn").disabled = false;
      $("#favoriteBtn").textContent = letter.favorite ? "★ 즐겨찾기됨" : "☆ 즐겨찾기";
      updateScreenshotControls();
    }

    function compactKeywordText(parts) {
      return parts
        .flat(Infinity)
        .filter(Boolean)
        .join(" ")
        .toLowerCase()
        .replace(/\s/g, "");
    }

    function countKeywordMatches(text, keywords = []) {
      return keywords.reduce((count, keyword) => {
        const normalized = String(keyword).toLowerCase().replace(/\s/g, "");
        return normalized && text.includes(normalized) ? count + 1 : count;
      }, 0);
    }

    function weightedSample(items) {
      const total = items.reduce((sum, item) => sum + item.weight, 0);
      let cursor = Math.random() * total;
      for (const item of items) {
        cursor -= item.weight;
        if (cursor <= 0) return item.theme;
      }
      return items.at(-1)?.theme || sample(newsThemes);
    }

    function chooseNewsTheme(character) {
      const positiveText = compactKeywordText([
        getDisplayName(character),
        character.fullName,
        character.job,
        character.mbti,
        character.tone,
        character.description,
        character.likes,
        character.personality
      ]);
      const dislikeText = compactKeywordText([character.dislikes]);
      const month = new Date().getMonth() + 1;
      const summerIds = new Set(["summer", "beach", "garden", "photo_walk"]);
      let matched = 0;
      const weighted = newsThemes.map((theme) => {
        const keywords = themeKeywordMap[theme.id] || [];
        const positiveMatches = countKeywordMatches(positiveText, keywords);
        const dislikeMatches = countKeywordMatches(dislikeText, keywords);
        matched += positiveMatches;
        let weight = 1 + (positiveMatches * 2.4);
        if (month >= 6 && month <= 8 && summerIds.has(theme.id)) weight += 0.8;
        if (dislikeMatches) weight -= dislikeMatches * 1.7;
        return {
          theme,
          weight: Math.max(0.35, weight)
        };
      });
      if (!matched) {
        const seasonalPool = month >= 6 && month <= 8
          ? [...newsThemes, ...newsThemes.filter((theme) => summerIds.has(theme.id))]
          : newsThemes;
        return sample(seasonalPool);
      }
      return weightedSample(weighted);
    }

        discovery: sample(theme.discoveries || ["별건 아닌데 기억에 남았어."]),

    function loadBitmapFallback(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    async function resizeImage(file) {
      const bitmap = window.createImageBitmap ? await createImageBitmap(file) : await loadBitmapFallback(file);
      const max = 500;
      const ratio = Math.min(1, max / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * ratio));
      const height = Math.max(1, Math.round(bitmap.height * ratio));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(bitmap, 0, 0, width, height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.78));
      if (!window.createImageBitmap) URL.revokeObjectURL(bitmap.src);
      bitmap.close?.();
      return { blob, width, height };
    }

    async function handleImages(files) {
      const added = [];
      for (const file of files) {
        try {
          const resized = await resizeImage(file);
          const record = { id: uid("img"), blob: resized.blob, mime: "image/jpeg", size: resized.blob.size, name: file.name, createdAt: new Date().toISOString() };
          await putImage(record);
          added.push({ type: "indexedDB", id: record.id, size: record.size, name: record.name });
        } catch (error) {
          showFormError(`이미지 처리 실패: ${file.name} (${error.message || error})`);
        }
      }
      pendingImages.push(...added);
      if (!pendingPrimaryImageId && pendingImages.length) pendingPrimaryImageId = pendingImages[0].id;
      renderImagePreview();
      updateStorageInfo();
      if (added.length) toast(`이미지 ${added.length}장을 줄여 저장했어요.`);
    }

    function formatBytes(bytes) {
      if (!bytes) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderImagePreview() {
      if (!pendingImages.some((image) => image.id === pendingPrimaryImageId)) {
        pendingPrimaryImageId = pendingImages[0]?.id || "";
      }
      const totalSize = pendingImages.reduce((sum, image) => sum + (image.size || 0), 0);
      $("#imageInfo").textContent = pendingImages.length
        ? `이미지 ${pendingImages.length}장 · 저장 전 이미지 용량 ${formatBytes(totalSize)}`
        : "업로드 시 최대 500px, JPEG 78% 품질로 줄여 IndexedDB에 저장합니다.";
      $("#imagePreview").innerHTML = pendingImages.map((image, index) => `
        <div class="preview ${image.id === pendingPrimaryImageId ? "primary" : ""}">
          <img src="${fallbackImage}" data-preview-image="${index}" alt="">
          <span class="preview-size">${formatBytes(image.size || 0)}</span>
          <button class="preview-delete" type="button" data-delete-preview="${image.id}" aria-label="이미지 삭제">×</button>
          <button class="preview-primary" type="button" data-primary-preview="${image.id}">${image.id === pendingPrimaryImageId ? "대표 이미지" : "대표 지정"}</button>
        </div>
      `).join("");
      pendingImages.forEach((image, index) => hydrateImageElement($(`[data-preview-image="${index}"]`), image));
    }

    function updateStorageInfo() {
      const localBytes = new Blob([localStorage.getItem(STORAGE_KEY) || ""]).size;
      const imageBytes = state.characters.flatMap((c) => c.images || []).reduce((sum, image) => sum + (image.size || 0), 0);
      const largest = state.characters
        .flatMap((character) => (character.images || []).map((image) => ({ character: getDisplayName(character), image })))
        .sort((a, b) => (b.image.size || 0) - (a.image.size || 0))[0];
      const text = `LocalStorage 텍스트 ${formatBytes(localBytes)} · IndexedDB 이미지 참조 ${formatBytes(imageBytes)}${largest ? ` · 가장 큰 이미지: ${largest.character} ${formatBytes(largest.image.size)}` : ""}`;
      const el = $("#storageInfo");
      if (el) el.textContent = text;
    }

    async function deleteCharacter(id) {
      const character = getCharacterById(id);
      if (!character || !confirm(`${getDisplayName(character)} 캐릭터와 관련 편지를 모두 삭제할까요?`)) return;
      for (const image of character.images || []) await deleteImage(image.id);
      state.characters = state.characters.filter((item) => item.id !== id);
      state.letters = state.letters.filter((letter) => letter.characterId !== id);
      state.newsArchive = (state.newsArchive || []).filter((news) => news.characterId !== id);
      if (state.currentNews?.characterId === id) state.currentNews = null;
      if (state.currentLetterId && !state.letters.some((letter) => letter.id === state.currentLetterId)) state.currentLetterId = null;
      saveState();
      renderAll();
      toast("삭제되었습니다.");
    }

    async function deleteLetter(id) {
      const letter = state.letters.find((item) => item.id === id);
      if (!letter || !confirm("이 편지를 삭제할까요?")) return;
      state.letters = state.letters.filter((item) => item.id !== id);
      if (state.currentLetterId === id) state.currentLetterId = null;
      saveState();
      renderAll();
      toast("편지를 삭제했어요.");
    }

    function deleteNewsArchiveItem(id) {
      const news = (state.newsArchive || []).find((item) => item.id === id);
      if (!news || !confirm("이 오늘의 소식을 삭제할까요?")) return;
      state.newsArchive = (state.newsArchive || []).filter((item) => item.id !== id);
      if (state.currentNews?.id === id) state.currentNews = null;
      saveState();
      renderHistory();
      renderNews();
      renderNewsActions();
      toast("오늘의 소식을 삭제했어요.");
    }

    function toggleFavorite(id) {
      const letter = state.letters.find((item) => item.id === id);
      if (!letter) return;
      letter.favorite = !letter.favorite;
      saveState();
      renderAll();
    }

    function sanitizeFileName(value) {
      return String(value || "sim")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "-")
        .slice(0, 40) || "sim";
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = [...document.scripts].find((script) => script.src === src);
        if (existing && existing.dataset.loaded === "true") {
          resolve();
          return;
        }
        if (existing) existing.remove();
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        const timeout = window.setTimeout(() => {
          script.remove();
          reject(new Error("script load timeout"));
        }, 8000);
        script.onload = () => {
          window.clearTimeout(timeout);
          script.dataset.loaded = "true";
          resolve();
        };
        script.onerror = () => {
          window.clearTimeout(timeout);
          script.remove();
          reject(new Error("script load failed"));
        };
        document.head.appendChild(script);
      });
    }

    async function ensureHtml2Canvas() {
      if (typeof window.html2canvas === "function") return true;
      for (const source of HTML2CANVAS_SOURCES) {
        try {
          await loadScript(source);
          if (typeof window.html2canvas === "function") {
            window.html2canvasLoadFailed = false;
            return true;
          }
        } catch (_) {}
      }
      return false;
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function imageRefToDataUrl(imageRef) {
      if (!imageRef) return fallbackImage;
      if (imageRef.type === "localData" && imageRef.dataUrl) return imageRef.dataUrl;
      if (imageRef.type === "indexedDB" && imageRef.id) {
        const record = await getImage(imageRef.id);
        if (record?.blob) return blobToDataUrl(record.blob);
      }
      return fallbackImage;
    }

    async function waitForImages(root) {
      const images = [...root.querySelectorAll("img")];
      await Promise.all(images.map(async (img) => {
        if (img.complete && img.naturalWidth) return;
        if (img.decode) {
          try {
            await img.decode();
            return;
          } catch (_) {}
        }
        await new Promise((resolve) => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    function stageToCanvasFallback(stage) {
      return new Promise((resolve, reject) => {
        const rect = stage.getBoundingClientRect();
        const width = Math.max(1, Math.ceil(rect.width));
        const height = Math.max(1, Math.ceil(stage.scrollHeight || rect.height));
        const clone = stage.cloneNode(true);
        clone.style.width = `${width}px`;
        clone.style.minHeight = `${height}px`;
        clone.style.margin = "0";
        const styleText = [...document.querySelectorAll("style")].map((style) => style.textContent || "").join("\n");
        const wrapper = document.createElement("div");
        wrapper.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
        const style = document.createElement("style");
        style.textContent = styleText;
        wrapper.appendChild(style);
        wrapper.appendChild(clone);
        const serialized = new XMLSerializer().serializeToString(wrapper);
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
            <foreignObject width="100%" height="100%">${serialized}</foreignObject>
          </svg>`;
        const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          const scale = Math.min(2, window.devicePixelRatio || 1.5);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(width * scale);
          canvas.height = Math.round(height * scale);
          const context = canvas.getContext("2d");
          context.fillStyle = getComputedStyle(stage).backgroundColor || "#fffaf0";
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.scale(scale, scale);
          context.drawImage(image, 0, 0, width, height);
          URL.revokeObjectURL(url);
          resolve(canvas);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("fallback screenshot failed"));
        };
        image.src = url;
      });
    }

    function screenshotDateLabel(value = new Date()) {
      const date = value instanceof Date ? value : new Date(value || Date.now());
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    async function captureElementCanvas(target) {
      const rect = target.getBoundingClientRect();
      const width = Math.max(target.scrollWidth, Math.ceil(rect.width), 1);
      const height = Math.max(target.scrollHeight, Math.ceil(rect.height), 1);
      try {
        return await window.html2canvas(target, {
          backgroundColor: getComputedStyle(target).backgroundColor || "#fffaf0",
          scale: Math.min(2, window.devicePixelRatio || 1.5),
          useCORS: false,
          allowTaint: false,
          logging: false,
          scrollX: 0,
          scrollY: 0,
          width,
          height,
          windowWidth: Math.max(document.documentElement.scrollWidth, width),
          windowHeight: Math.max(document.documentElement.scrollHeight, height)
        });
      } catch (error) {
        console.warn("html2canvas failed, trying fallback", error);
        return stageToCanvasFallback(target);
      }
    }

    function isScreenshotControlVisible() {
      return !document.body.classList.contains("mobile-layout") && window.innerWidth > 860;
    }

    function canvasToPngBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("canvas blob creation failed"));
        }, "image/png");
      });
    }

    function isMobileScreenshotBlocked() {
      const ua = navigator.userAgent || "";
      const mobileUA = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua);
      const coarsePointer = window.matchMedia("(pointer: coarse)").matches;
      const smallViewport = window.innerWidth <= 860;
      const smallScreen = Math.min(window.screen.width || window.innerWidth, window.screen.height || window.innerHeight) <= 860;
      return mobileUA || coarsePointer || smallViewport || smallScreen || document.body.classList.contains("mobile-layout");
    }

    function isScreenshotControlVisible() {
      return !isMobileScreenshotBlocked();
    }

    function updateScreenshotControls() {
      const blocked = isMobileScreenshotBlocked();
      document.body.classList.toggle("screenshot-disabled", blocked);
      [$("#screenshotBtn"), $("#screenshotNewsBtn")].forEach((button) => {
        if (button) button.hidden = blocked;
      });
    }

    async function downloadCanvasAsPng(canvas, filename) {
      const blob = await canvasToPngBlob(canvas);
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast("\uC2A4\uD06C\uB9B0\uC0F7\uC744 \uB2E4\uC6B4\uB85C\uB4DC\uD588\uC5B4\uC694.");
    }

    async function downloadLetterScreenshot() {
      if (!isScreenshotControlVisible()) return;
      const letter = getCurrentLetter();
      const stage = $("#letterStage");
      if (!letter || !stage) return;
      const isReady = await ensureHtml2Canvas();
      const image = $("#currentLetterImage");
      try {
        if (image) {
          image.src = await imageRefToDataUrl(letter.image);
          await waitForImages(stage);
        }
        if (!isReady) throw new Error("html2canvas unavailable");
        const canvas = await captureElementCanvas(stage);
        const filename = `\uC2EC\uC988\uC6B0\uCCB4\uD1B5_\uD3B8\uC9C0_${screenshotDateLabel(letter.createdAt)}.png`;
        await downloadCanvasAsPng(canvas, filename);
      } catch (error) {
        console.warn("Screenshot failed", error);
        toast(isReady ? "\uC2A4\uD06C\uB9B0\uC0F7 \uC800\uC7A5\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4." : "\uC2A4\uD06C\uB9B0\uC0F7 \uB77C\uC774\uBE0C\uB7EC\uB9AC \uB85C\uB529\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4.");
      } finally {
        if (image) hydrateImageElement(image, letter.image);
      }
    }

    async function downloadNewsScreenshot() {
      if (!isScreenshotControlVisible()) return;
      const news = normalizeNewsItem(state.currentNews);
      const stage = $("#newsDisplay.news-card");
      if (!news || !stage) return;
      const isReady = await ensureHtml2Canvas();
      const image = $("#currentNewsImage");
      try {
        if (image) {
          image.src = await imageRefToDataUrl(news.image);
          await waitForImages(stage);
        }
        if (!isReady) throw new Error("html2canvas unavailable");
        const canvas = await captureElementCanvas(stage);
        const filename = `\uC2EC\uC988\uC6B0\uCCB4\uD1B5_\uC18C\uC2DD_${screenshotDateLabel(news.createdAt)}.png`;
        await downloadCanvasAsPng(canvas, filename);
      } catch (error) {
        console.warn("News screenshot failed", error);
        toast(isReady ? "\uC2A4\uD06C\uB9B0\uC0F7 \uC800\uC7A5\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4." : "\uC2A4\uD06C\uB9B0\uC0F7 \uB77C\uC774\uBE0C\uB7EC\uB9AC \uB85C\uB529\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4.");
      } finally {
        if (image) hydrateImageElement(image, news.image);
      }
    }

    function bindEvents() {
      window.addEventListener("resize", syncMobileLayoutClass);
      window.addEventListener("orientationchange", syncMobileLayoutClass);
      $$(".tab-btn").forEach((button) => button.addEventListener("click", () => switchTab(button.dataset.tab)));
      $("#characterManageBtn").addEventListener("click", openCharacterManager);
      $("#closeCharacterModal").addEventListener("click", closeCharacterManager);
      $("#closeArchivePreviewModal").addEventListener("click", closeArchivePreview);
      $("#characterModal").addEventListener("click", (event) => {
        if (event.target.id === "characterModal") closeCharacterManager();
      });
      $("#archivePreviewModal").addEventListener("click", (event) => {
        if (event.target.id === "archivePreviewModal" || event.target.closest("[data-close-archive-preview]")) closeArchivePreview();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !$("#characterModal").hidden) closeCharacterManager();
        if (event.key === "Escape" && !$("#archivePreviewModal").hidden) closeArchivePreview();
      });
      $("#darkToggle").addEventListener("click", () => { state.darkMode = !state.darkMode; saveState(); renderAll(); });
      $("#saveTodayMeBtn").addEventListener("click", () => {
        saveUserProfileFromInputs();
        saveTodayRecordFromInputs();
        toast("저장했어요.");
      });
      $("#receiveBtn").addEventListener("click", () => receiveLetter());
      $("#favoriteBtn").addEventListener("click", () => toggleFavorite(state.currentLetterId));
      $("#screenshotBtn").addEventListener("click", downloadLetterScreenshot);
      $("#targetCharacterSelect").addEventListener("change", (event) => updateSelectedCharacter(event.target.value));
      $("#newsTargetCharacterSelect").addEventListener("change", (event) => updateSelectedCharacter(event.target.value));
      $("#newsActions").addEventListener("click", (event) => {
        if (event.target.closest("[data-news-refresh]")) receiveNews();
        if (event.target.closest("#screenshotNewsBtn")) downloadNewsScreenshot();
      });
      $("#showLetterArchive").addEventListener("click", () => { archiveMode = "letters"; renderHistory(); });
      $("#showNewsArchive").addEventListener("click", () => { archiveMode = "news"; renderHistory(); });
      $("#showAllLetters").addEventListener("click", () => { archiveFilter = "all"; renderHistory(); });
      $("#showFavoriteLetters").addEventListener("click", () => { archiveFilter = "favorites"; renderHistory(); });
      $("#archiveCharacterFilter").addEventListener("change", (event) => { archiveCharacterFilter = event.target.value; renderHistory(); });
      $("#archiveSort").addEventListener("change", (event) => { archiveSort = event.target.value; renderHistory(); });
      $("#resetFormBtn").addEventListener("click", resetForm);
      $("#images").addEventListener("change", (event) => handleImages([...event.target.files]));

      $("#imagePreview").addEventListener("click", async (event) => {
        const remove = event.target.closest("[data-delete-preview]");
        const primary = event.target.closest("[data-primary-preview]");
        if (remove) {
          const id = remove.dataset.deletePreview;
          const image = pendingImages.find((item) => item.id === id);
          if (!image || !confirm("이 이미지만 삭제할까요?")) return;
          await deleteImage(id);
          pendingImages = pendingImages.filter((item) => item.id !== id);
          if (pendingPrimaryImageId === id) pendingPrimaryImageId = pendingImages[0]?.id || "";
          const editingId = $("#editingId").value;
          const editingCharacter = getCharacterById(editingId);
          if (editingCharacter) {
            editingCharacter.images = editingCharacter.images.filter((item) => item.id !== id);
            if (editingCharacter.primaryImageId === id) editingCharacter.primaryImageId = editingCharacter.images[0]?.id || "";
            state.letters.forEach((letter) => {
              if (letter.characterId === editingId && letter.image?.id === id) letter.image = editingCharacter.images[0] || null;
            });
            if (state.currentNews?.characterId === editingId && state.currentNews.image?.id === id) {
              state.currentNews.image = editingCharacter.images[0] || null;
            }
            saveState();
            renderStats();
            renderCharacters();
            renderHistory();
          }
          renderImagePreview();
          updateStorageInfo();
          toast("이미지를 삭제했어요.");
        }
        if (primary) {
          pendingPrimaryImageId = primary.dataset.primaryPreview;
          const editingCharacter = getCharacterById($("#editingId").value);
          if (editingCharacter) {
            editingCharacter.primaryImageId = pendingPrimaryImageId;
            saveState();
            renderCharacters();
          }
          renderImagePreview();
          toast("대표 이미지로 지정했어요.");
        }
      });

      $("#categoryButtons").addEventListener("click", (event) => {
        const button = event.target.closest("[data-category]");
        if (!button) return;
        state.selectedCategory = button.dataset.category;
        saveState();
        renderCategories();
      });

      $("#characterForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        clearFormError();
        try {
          const character = normalizeCharacter(collectCharacterFromForm());
          const existingIndex = state.characters.findIndex((item) => item.id === character.id);
          if (existingIndex >= 0) {
            const oldImages = state.characters[existingIndex].images || [];
            const removed = oldImages.filter((old) => !character.images.some((image) => image.id === old.id));
            for (const image of removed) await deleteImage(image.id);
            state.characters[existingIndex] = character;
          } else {
            state.characters.unshift(character);
          }
          saveState();
          resetForm();
          renderAll();
          toast("저장되었습니다.");
        } catch (error) {
          showFormError(error.message || String(error));
        }
      });

      $("#characterList").addEventListener("click", (event) => {
        const edit = event.target.closest("[data-edit]");
        const letterFrom = event.target.closest("[data-letter-from]");
        const remove = event.target.closest("[data-delete-character]");
        if (edit) fillForm(getCharacterById(edit.dataset.edit));
        if (letterFrom) receiveLetter(getCharacterById(letterFrom.dataset.letterFrom));
        if (remove) deleteCharacter(remove.dataset.deleteCharacter);
      });

      $("#historyList").addEventListener("click", (event) => {
        const open = event.target.closest("[data-open-letter]");
        const fav = event.target.closest("[data-toggle-favorite]");
        const remove = event.target.closest("[data-delete-letter]");
        const openNews = event.target.closest("[data-open-news]");
        const removeNews = event.target.closest("[data-delete-news]");
        if (open) {
          openArchivePreview("letter", open.dataset.openLetter);
        }
        if (fav) toggleFavorite(fav.dataset.toggleFavorite);
        if (remove) deleteLetter(remove.dataset.deleteLetter);
        if (openNews) {
          openArchivePreview("news", openNews.dataset.openNews);
        }
        if (removeNews) deleteNewsArchiveItem(removeNews.dataset.deleteNews);
      });
    }

    function setupOptions() {
      $("#tone").innerHTML = `<option value="" disabled selected>예: 다정함, 장난꾸러기, 차분함</option>${toneStyles.map((tone) => `<option>${tone}</option>`).join("")}`;
      $("#categoryButtons").innerHTML = categories.map((category) => `<button type="button" class="category-btn" data-category="${category}">${category}</button>`).join("");
    }

    async function init() {
      syncMobileLayoutClass();
      setupOptions();
      bindEvents();
      await migrateLegacyImages();
      renderAll();
    }

    init();
  </script>
